<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px; background-color: rgb(194, 241, 225); margin: auto; margin-top: 400px ;width: fit-content;">
        <h1>Counter</h1>
        <p  class="out" style="color: green; font-size: 18px;">2</p>
        <div style="display: flex; flex-direction: row; gap: 4px;">
<button  class="increase" onclick="increase()" style="padding: 7px; background-color: gainsboro;border: 1px solid black; border-radius: 5px;">increase</button>
<button class="decrease" onclick="decrease()" style="padding: 7px; background-color: gainsboro;border: 1px solid black; border-radius: 5px;">decrease</button>
<button class="reset" onclick="reset()" style="padding: 7px; background-color: gainsboro;border: 1px solid black; border-radius: 5px;">reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
